# Copy this file to ~/.config/ncvoters/config.yaml and edit as needed.
#
# selected_columns: columns to import from the voter file into the database.
# sanitize_columns: subset of selected_columns where embedded whitespace is
#                   collapsed to a single space and leading/trailing space trimmed.

selected_columns:
  - county_id
  - voter_reg_num
  - last_name
  - first_name
  - middle_name
  - name_suffix_lbl
  - status_cd
  - reason_cd
  - res_street_address
  - res_city_desc
  - state_cd
  - zip_code
  - full_phone_number
  - race_code
  - ethnic_code
  - party_cd
  - gender_code
  - birth_year
  - age_at_year_end
  - birth_state

sanitize_columns:
  - last_name
  - first_name
  - middle_name
  - res_street_address
  - res_city_desc
