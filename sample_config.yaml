# Copy this file to ~/.config/ncvoters/config.yaml and edit as needed.
#
# db_dir: directory where voter_data.db is created.
#         Supports ~ expansion.  If omitted, /tmp is used.
#         A positional argument on the command line overrides this.
#         Any existing voter_data.db in this directory is renamed to
#         voter_data_YYYYMMDD_HHMMSS.db before a new build starts.
#
#db_dir: ~/Desktop
#
# selected_columns: columns to import from the voter file into the database.
# sanitize_columns: subset of selected_columns where embedded whitespace is
#                   collapsed to a single space and leading/trailing space trimmed.
#
# Indexes are stored as individual SQL files in ~/.config/ncvoters/indexes/.
# Each file should contain a single CREATE INDEX <name> ON <table> (...) statement.
# Indexes are applied automatically after every full build, and can also be
# applied incrementally to an existing database with the apply-indexes command.
#
# Views are stored as individual SQL files in ~/.config/ncvoters/views/.
# Each file should contain a single CREATE VIEW <name> AS ... statement.
# Views are applied automatically after every full build, and can also be
# applied incrementally to an existing database with the apply-views command.

selected_columns:
  - county_id
  - voter_reg_num
  - last_name
  - first_name
  - middle_name
  - name_suffix_lbl
  - status_cd
  - reason_cd
  - res_street_address
  - res_city_desc
  - state_cd
  - zip_code
  - full_phone_number
  - race_code
  - ethnic_code
  - party_cd
  - gender_code
  - birth_year
  - age_at_year_end
  - birth_state

sanitize_columns:
  - last_name
  - first_name
  - middle_name
  - res_street_address
  - res_city_desc
